<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Shop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        header { background: #333; color: white; padding: 20px; text-align: center; }
        .product-grid { display: flex; gap: 20px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        .product-card { background: white; padding: 20px; border-radius: 8px; width: 220px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Style for our product images */
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; }
        
        .price { color: #28a745; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        
        /* Turning the button into a nice styled link */
        .buy-btn { display: inline-block; background: #25D366; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        .buy-btn:hover { background: #128C7E; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Store</h1>
        <p>Browse our amazing goods below!</p>
    </header>

    <main class="product-grid">
        
        {% for product in products %}
        <div class="product-card">
            <img src="{{ url_for('static', filename='images/' + product.image) }}" alt="{{ product.name }}" class="product-img">
            
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p class="price">{{ product.price }}</p>
            
            <a href="https://wa.me/{{ phone }}?text=Hello!%20I%20am%20interested%20in%20buying%20the%20{{ product.name }}%20for%20{{ product.price }}." 
               target="_blank" 
               class="buy-btn">
               Buy on WhatsApp
            </a>
        </div>
        {% endfor %}
        
    </main>

</body>
</html>
